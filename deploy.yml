# .github/workflows/deploy.yml
# Runs after every merge to main
# Creates folders, profiles, updates CODEOWNERS, builds, deploys

name: Deploy

on:
  push:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Setup — folder + profile + CODEOWNERS
  # ─────────────────────────────────────────
  setup-user:
    name: Setup User
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get changed markdown files
        run: |
          git diff --name-only HEAD~1 HEAD -- '*.md' '*.mdx' > changed.txt
          echo "Changed files:"
          cat changed.txt

      - name: Handle folder, profile, CODEOWNERS
        run: |
          ACTOR="${{ github.actor }}"
          POSTS_DIR="src/content/posts"
          AUTHORS_DIR="src/content/authors"
          USER_FOLDER="${POSTS_DIR}/${ACTOR}"
          CODEOWNERS=".github/CODEOWNERS"
          CHANGED=false

          mkdir -p "$AUTHORS_DIR"

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [[ "$file" != src/content/posts/* ]] && continue

            FOLDER_USER=$(echo "$file" | cut -d'/' -f4)
            FILENAME=$(basename "$file")

            # ── Create user folder if missing ──
            if [ ! -d "$USER_FOLDER" ]; then
              echo "📁 Creating folder for @${ACTOR}..."
              mkdir -p "$USER_FOLDER"
              CHANGED=true
            fi

            # ── Move file to correct folder if misplaced ──
            if [ "$FOLDER_USER" != "$ACTOR" ] && [ -f "$file" ]; then
              echo "📦 Moving $file → ${USER_FOLDER}/${FILENAME}"
              mv "$file" "${USER_FOLDER}/${FILENAME}"
              CHANGED=true
            fi

          done < changed.txt

          # ── Auto-create profile from GitHub API if missing ──
          PROFILE_FILE="${AUTHORS_DIR}/${ACTOR}.json"
          if [ ! -f "$PROFILE_FILE" ]; then
            echo " Fetching GitHub profile for @${ACTOR}..."
            GITHUB_DATA=$(curl -s \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/users/${ACTOR}")

            NAME=$(echo "$GITHUB_DATA" | jq -r '.name // .login')
            LOGIN=$(echo "$GITHUB_DATA" | jq -r '.login')
            AVATAR=$(echo "$GITHUB_DATA" | jq -r '.avatar_url')
            BIO=$(echo "$GITHUB_DATA" | jq -r '.bio // ""')

            cat > "$PROFILE_FILE" <<EOF
{
  "name": "$NAME",
  "login": "$LOGIN",
  "avatar_url": "$AVATAR",
  "bio": "$BIO"
}
EOF
            echo " Profile created: $PROFILE_FILE"
            CHANGED=true
          else
            echo " Profile exists for @${ACTOR}"
          fi

          # ── Update CODEOWNERS if user not listed ──
          if ! grep -q "@${ACTOR}" "$CODEOWNERS" 2>/dev/null; then
            echo "📝 Adding @${ACTOR} to CODEOWNERS..."
            echo "src/content/posts/${ACTOR}/*    @${ACTOR}" >> "$CODEOWNERS"
            CHANGED=true
          else
            echo "✅ @${ACTOR} already in CODEOWNERS"
          fi

          # ── Commit everything if anything changed ──
          if [ "$CHANGED" = true ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            git diff --staged --quiet || git commit -m "auto: setup @${ACTOR} [skip ci]"
            git push
          fi

  # ─────────────────────────────────────────
  # JOB 2: Build (astro + pagefind)
  # ─────────────────────────────────────────
  build:
    name: Build Site
    runs-on: ubuntu-latest
    needs: setup-user

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main   # re-checkout after bot commits in job 1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build + index
        run: npm run build
        # runs: astro build && pagefind --site dist

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ─────────────────────────────────────────
  # JOB 3: Deploy
  # ─────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── VERCEL (default) ──
      - name: Deploy to Vercel
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      # ── NETLIFY (uncomment to use instead) ──
      # - name: Deploy to Netlify
      #   run: npx netlify-cli deploy --prod --dir=dist
      #   env:
      #     NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      #     NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
