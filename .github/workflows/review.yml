# .github/workflows/review.yml
# Triggers on issue comments containing /approve or /reject
# Folder owner OR admin can approve
# /approve → re-applies commit + build
# /reject  → closes issue + notifies pusher

name: Review Handler

env:
  ADMINS: "harleen-acog"

on:
  issue_comment:
    types: [created]

jobs:
  handle-review:
    name: Handle Review
    runs-on: ubuntu-latest

    # Only on issues (not PRs) with needs-approval label
    if: |
      github.event.issue.pull_request == null &&
      contains(github.event.issue.labels.*.name, 'needs-approval') &&
      (
        startsWith(github.event.comment.body, '/approve') ||
        startsWith(github.event.comment.body, '/reject')
      )

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Parse commit SHA + pusher from hidden meta in issue body
      - name: Parse issue metadata
        id: meta
        run: |
          ISSUE_BODY="${{ github.event.issue.body }}"
          COMMIT_SHA=$(echo "$ISSUE_BODY" | grep -oP '(?<=commit=)[a-f0-9]+')
          PUSHER=$(echo "$ISSUE_BODY"     | grep -oP '(?<=pusher=)[a-zA-Z0-9_-]+')

          echo "commit_sha=$COMMIT_SHA"                           >> $GITHUB_OUTPUT
          echo "pusher=$PUSHER"                                   >> $GITHUB_OUTPUT
          echo "commenter=${{ github.event.comment.user.login }}" >> $GITHUB_OUTPUT
          echo "issue_number=${{ github.event.issue.number }}"    >> $GITHUB_OUTPUT

          echo "Commit:    $COMMIT_SHA"
          echo "Pusher:    $PUSHER"
          echo "Commenter: ${{ github.event.comment.user.login }}"

      # Check if commenter is folder owner or admin
      - name: Check authorization
        id: auth
        run: |
          COMMENTER="${{ steps.meta.outputs.commenter }}"
          COMMIT_SHA="${{ steps.meta.outputs.commit_sha }}"
          ISSUE_NUMBER="${{ steps.meta.outputs.issue_number }}"
          AUTHORIZED=false

          # Check admin
          IFS=',' read -ra ADMIN_LIST <<< "$ADMINS"
          for admin in "${ADMIN_LIST[@]}"; do
            if [ "$(echo $admin | tr -d ' ')" = "$COMMENTER" ]; then
              AUTHORIZED=true
              echo "✅ @$COMMENTER is admin"
            fi
          done

          # Check folder owner
          if [ "$AUTHORIZED" = false ]; then
            CHANGED=$(git diff-tree --no-commit-id -r --name-only "$COMMIT_SHA" 2>/dev/null || echo "")
            while IFS= read -r file; do
              [ -z "$file" ] && continue
              [[ "$file" != src/content/posts/* ]] && continue
              FOLDER_USER=$(echo "$file" | cut -d'/' -f4)
              if [ "$FOLDER_USER" = "$COMMENTER" ]; then
                AUTHORIZED=true
                echo "✅ @$COMMENTER owns folder"
              fi
            done <<< "$CHANGED"
          fi

          echo "authorized=$AUTHORIZED" >> $GITHUB_OUTPUT

          if [ "$AUTHORIZED" = false ]; then
            gh issue comment "$ISSUE_NUMBER" \
              --body "⛔ **@${COMMENTER}** is not authorized. Only the folder owner or an admin can approve." \
              --repo "${{ github.repository }}"
          fi

        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # /approve — re-apply commit
      - name: Approve
        if: |
          steps.auth.outputs.authorized == 'true' &&
          startsWith(github.event.comment.body, '/approve')
        run: |
          COMMENTER="${{ steps.meta.outputs.commenter }}"
          COMMIT_SHA="${{ steps.meta.outputs.commit_sha }}"
          PUSHER="${{ steps.meta.outputs.pusher }}"
          ISSUE_NUMBER="${{ steps.meta.outputs.issue_number }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin
          git cherry-pick "$COMMIT_SHA" --no-commit
          git commit -m "approved: @${COMMENTER} approved @${PUSHER}'s edit [skip ci]"
          git push origin main

          gh issue comment "$ISSUE_NUMBER" \
            --body "✅ **Approved by @${COMMENTER}** — commit \`${COMMIT_SHA:0:7}\` re-applied. Building now. @${PUSHER} your changes will be live shortly." \
            --repo "${{ github.repository }}"

          gh issue close "$ISSUE_NUMBER" --repo "${{ github.repository }}"

        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # /reject — close issue + notify
      - name: Reject
        if: |
          steps.auth.outputs.authorized == 'true' &&
          startsWith(github.event.comment.body, '/reject')
        run: |
          COMMENTER="${{ steps.meta.outputs.commenter }}"
          COMMIT_SHA="${{ steps.meta.outputs.commit_sha }}"
          PUSHER="${{ steps.meta.outputs.pusher }}"
          ISSUE_NUMBER="${{ steps.meta.outputs.issue_number }}"

          gh issue comment "$ISSUE_NUMBER" \
            --body "❌ **Rejected by @${COMMENTER}** — commit \`${COMMIT_SHA:0:7}\` will not be applied. @${PUSHER} reach out to the folder owner if this was a mistake." \
            --repo "${{ github.repository }}"

          gh issue close "$ISSUE_NUMBER" --repo "${{ github.repository }}"

        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build after approval
  build-after-approval:
    name: Build After Approval
    runs-on: ubuntu-latest
    needs: handle-review
    if: startsWith(github.event.comment.body, '/approve')

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npx astro build
