name: Push Handler

env:
  ADMINS: "harleen-acog"

on:
  push:
    branches:
      - main
    paths:
      - 'src/content/posts/**'

jobs:
  ownership-check:
    name: Ownership Check
    runs-on: ubuntu-latest
    outputs:
      is_clean: ${{ steps.check.outputs.is_clean }}
      is_new_user: ${{ steps.check.outputs.is_new_user }}   # ← new output

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get changed post files
        run: |
          git diff --name-status HEAD~1 HEAD -- 'src/content/posts/**' > changed.txt
          cat changed.txt

      - name: Check ownership + auto-fix
        id: check
        run: |
          ACTOR="${{ github.actor }}"
          REPO="${{ github.repository }}"

          IS_CLEAN=true
          AUTO_FIXED=false

          # check if this is a new user BEFORE anything else
          PROFILE_FILE="src/content/authors/${ACTOR}.json"
          if [ ! -f "$PROFILE_FILE" ]; then
            echo "is_new_user=true" >> $GITHUB_OUTPUT
          else
            echo "is_new_user=false" >> $GITHUB_OUTPUT
          fi

          while read STATUS file; do
            [ -z "$file" ] && continue
            [[ "$file" != src/content/posts/* ]] && continue

            EXTENSION="${file##*.}"
            IMAGE_EXTENSIONS="jpg jpeg png gif webp"

            IS_IMAGE=false
            for ext in $IMAGE_EXTENSIONS; do
              if [ "$EXTENSION" = "$ext" ]; then
                IS_IMAGE=true
                break
              fi
            done

            DEPTH=$(echo "$file" | tr '/' '\n' | wc -l)
            FOLDER_USER=$(echo "$file" | cut -d'/' -f4)
            FILENAME=$(basename "$file")

            #  DELETE CASE
            if [ "$STATUS" = "D" ]; then
              if [ "$FOLDER_USER" = "$ACTOR" ] || [[ "$ADMINS" == *"$ACTOR"* ]]; then
                echo " Allowed delete: $file"
                continue
              else
                echo "Delete not allowed: $file"
                IS_CLEAN=false
                continue
              fi
            fi

            #  INVALID PATH → auto-fix (first-time user)
            # posts must be at depth 5, images must be at depth 6 (inside /images/)
            if { [ "$IS_IMAGE" = false ] && [ "$DEPTH" -ne 5 ]; } || \
               { [ "$IS_IMAGE" = true  ] && [ "$DEPTH" -ne 6 ]; }; then
              echo " Invalid path: $file"

              if [ "$IS_IMAGE" = true ]; then
                CORRECT_DIR="src/content/posts/${ACTOR}/images"
              else
                CORRECT_DIR="src/content/posts/${ACTOR}"
              fi

              CORRECT_PATH="${CORRECT_DIR}/${FILENAME}"

              mkdir -p "$CORRECT_DIR"
              git mv "$file" "$CORRECT_PATH"

              AUTO_FIXED=true
              continue
            fi

            #  FOREIGN EDIT → add contributor
            if [ "$FOLDER_USER" != "$ACTOR" ]; then
              echo " Foreign edit detected: $file"

              # skip contributor injection for images — only applies to md/mdx
              if [ "$IS_IMAGE" = false ]; then
                if grep -q "^contributors:" "$file"; then
                  if ! grep -q "$ACTOR" "$file"; then
                    sed -i "/^contributors:/ s/]$/, \"$ACTOR\"]/" "$file"
                  fi
                else
                  sed -i "1,/^---$/ s/^---$/---\ncontributors: [\"$FOLDER_USER\", \"$ACTOR\"]/" "$file"
                fi
              fi

              AUTO_FIXED=true
              continue
            fi

          done < changed.txt

          #  Auto-fix commit (paths OR contributors)
          if [ "$AUTO_FIXED" = true ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            git commit -am "auto: fix post path / contributors for @${ACTOR}"
            git pull --rebase origin main
            git push origin main

            echo "is_clean=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "is_clean=$IS_CLEAN" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  setup-user:
    name: Setup User
    runs-on: ubuntu-latest
    needs: ownership-check
    # only runs for new users — skipped entirely for existing users
    if: |
      needs.ownership-check.outputs.is_clean == 'true' &&
      needs.ownership-check.outputs.is_new_user == 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup profile + CODEOWNERS
        run: |
          ACTOR="${{ github.actor }}"
          AUTHORS_DIR="src/content/authors"
          CODEOWNERS=".github/CODEOWNERS"
          CHANGED=false

          mkdir -p "$AUTHORS_DIR"

          PROFILE_FILE="${AUTHORS_DIR}/${ACTOR}.json"
          POSTS_DIR="src/content/posts/${ACTOR}"
          IMAGES_DIR="${POSTS_DIR}/images"

          DATA=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/users/${ACTOR}")

          NAME=$(echo "$DATA" | jq -r '.name // .login')
          LOGIN=$(echo "$DATA" | jq -r '.login')
          AVATAR=$(echo "$DATA" | jq -r '.avatar_url')
          BIO=$(echo "$DATA" | jq -r '.bio // ""')

          jq -n \
            --arg name "$NAME" \
            --arg login "$LOGIN" \
            --arg avatar "$AVATAR" \
            --arg bio "$BIO" \
            '{
              name: $name,
              login: $login,
              avatar_url: $avatar,
              bio: $bio
            }' > "$PROFILE_FILE"

          # create posts + images folder for the new user
          mkdir -p "$IMAGES_DIR"
          touch "$IMAGES_DIR/.gitkeep"

          echo "src/content/posts/${ACTOR}/*    @${ACTOR}" >> "$CODEOWNERS"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git diff --staged --quiet || git commit -m "auto: setup @${ACTOR} [skip ci]"

          git pull --rebase origin main
          git push origin main

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [ownership-check, setup-user]
    # runs when is_clean AND either setup-user ran (new user) or was skipped (existing user)
    if: |
      always() &&
      needs.ownership-check.outputs.is_clean == 'true' &&
      (needs.setup-user.result == 'success' || needs.setup-user.result == 'skipped')

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main    # always deploy final state after all bot fixes

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Build check
        run: |
          npm ci
          npx astro build

      - name: Install Vercel CLI
        run: npm install --global vercel

      - name: Deploy to Vercel
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}