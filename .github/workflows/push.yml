name: Push Handler

env:
  ADMINS: "harleen-acog"

on:
  push:
    branches:
      - main
    paths:
      - 'src/content/posts/**'

jobs:
  ownership-check:
    name: Ownership Check
    runs-on: ubuntu-latest
    outputs:
      is_clean: ${{ steps.check.outputs.is_clean }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get changed post files
        run: |
          git diff --name-status HEAD~1 HEAD -- '*.md' '*.mdx' > changed.txt
          cat changed.txt

      - name: Check ownership + auto-fix
        id: check
        run: |
          ACTOR="${{ github.actor }}"
          REPO="${{ github.repository }}"

          FOREIGN_FILES=""
          IS_CLEAN=true
          AUTO_FIXED=false

          while read STATUS file; do
            [ -z "$file" ] && continue
            [[ "$file" != src/content/posts/* ]] && continue

            DEPTH=$(echo "$file" | tr '/' '\n' | wc -l)
            FOLDER_USER=$(echo "$file" | cut -d'/' -f4)
            FILENAME=$(basename "$file")

            # 🗑️ DELETE CASE
            if [ "$STATUS" = "D" ]; then
              if [ "$FOLDER_USER" = "$ACTOR" ] || [[ "$ADMINS" == *"$ACTOR"* ]]; then
                echo "✅ Allowed delete: $file"
                continue
              else
                FOREIGN_FILES="${FOREIGN_FILES}\n- \`$file\` (delete not allowed)"
                IS_CLEAN=false
                continue
              fi
            fi

            # ⚠️ INVALID PATH → auto-fix
            if [ "$DEPTH" -ne 5 ]; then
              echo "⚠️ Invalid path: $file"

              CORRECT_DIR="src/content/posts/${ACTOR}"
              CORRECT_PATH="${CORRECT_DIR}/${FILENAME}"

              mkdir -p "$CORRECT_DIR"
              git mv "$file" "$CORRECT_PATH"

              AUTO_FIXED=true
              continue
            fi

            # ❌ FOREIGN FOLDER
            if [ "$FOLDER_USER" != "$ACTOR" ]; then
              FOREIGN_FILES="${FOREIGN_FILES}\n- \`$file\` (belongs to @${FOLDER_USER})"
              IS_CLEAN=false
            fi

          done < changed.txt

          # ✅ Auto-fix commit
          if [ "$AUTO_FIXED" = true ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            git commit -am "auto: fix post path for @${ACTOR}"
            git pull --rebase origin main
            git push origin main

            echo "is_clean=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "is_clean=$IS_CLEAN" >> $GITHUB_OUTPUT

          # ❌ FOREIGN → revert + issue
          if [ "$IS_CLEAN" = false ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            git revert --no-edit HEAD
            git pull --rebase origin main
            git push origin main

            gh label create "needs-approval" --color "f9d0c4" --force || true

            gh issue create \
              --title "🔔 @${ACTOR} wants to edit protected content" \
              --body "Issue raised. Comment /approve to allow or /reject to deny." \
              --label "needs-approval" \
              --repo "$REPO"

            echo "Reverted + issue opened"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  setup-user:
    name: Setup User
    runs-on: ubuntu-latest
    needs: ownership-check
    if: needs.ownership-check.outputs.is_clean == 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup profile + CODEOWNERS
        run: |
          ACTOR="${{ github.actor }}"
          AUTHORS_DIR="src/content/authors"
          CODEOWNERS=".github/CODEOWNERS"
          CHANGED=false

          mkdir -p "$AUTHORS_DIR"

          PROFILE_FILE="${AUTHORS_DIR}/${ACTOR}.json"

          if [ ! -f "$PROFILE_FILE" ]; then
            DATA=$(curl -s \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/users/${ACTOR}")

            NAME=$(echo "$DATA" | jq -r '.name // .login')
            LOGIN=$(echo "$DATA" | jq -r '.login')
            AVATAR=$(echo "$DATA" | jq -r '.avatar_url')
            BIO=$(echo "$DATA" | jq -r '.bio // ""')

            jq -n \
              --arg name "$NAME" \
              --arg login "$LOGIN" \
              --arg avatar "$AVATAR" \
              --arg bio "$BIO" \
              '{
                name: $name,
                login: $login,
                avatar_url: $avatar,
                bio: $bio
              }' > "$PROFILE_FILE"

            CHANGED=true
          fi

          if ! grep -q "@${ACTOR}" "$CODEOWNERS" 2>/dev/null; then
            echo "src/content/posts/${ACTOR}/*    @${ACTOR}" >> "$CODEOWNERS"
            CHANGED=true
          fi

          if [ "$CHANGED" = true ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            git add .
            git diff --staged --quiet || git commit -m "auto: setup @${ACTOR} [skip ci]"

            git pull --rebase origin main
            git push origin main
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: setup-user

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npx astro build