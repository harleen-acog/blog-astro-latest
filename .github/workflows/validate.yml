# .github/workflows/validate.yml
# Runs on every PR to main
# Validates paths, ownership, frontmatter
# Auto-merges if user is uploading to their own folder

name: Validate PR

on:
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Validate path + ownership
  # ─────────────────────────────────────────
  validate-and-handle:
    name: Check Post Paths
    runs-on: ubuntu-latest

    outputs:
      self_owned: ${{ steps.check.outputs.self_owned }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed markdown files
        run: |
          git diff --name-only origin/main...HEAD -- '*.md' '*.mdx' > changed.txt
          echo "Changed files:"
          cat changed.txt

      - name: Validate paths and ownership
        id: check
        run: |
          ACTOR="${{ github.actor }}"
          ERRORS=0
          SELF_OWNED=true
          HAS_POST_FILES=false

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [[ "$file" != src/content/posts/* ]] && continue

            HAS_POST_FILES=true
            DEPTH=$(echo "$file" | tr '/' '\n' | wc -l)
            FOLDER_USER=$(echo "$file" | cut -d'/' -f4)

            # Check depth: src/content/posts/{user}/{slug}.md = 5 parts
            if [ "$DEPTH" -ne 5 ]; then
              echo "❌ Wrong path depth: $file"
              echo "   Expected: src/content/posts/{username}/{post}.md"
              ERRORS=$((ERRORS + 1))
              continue
            fi

            # Check if editing someone else's folder
            if [ "$FOLDER_USER" != "$ACTOR" ]; then
              echo "⚠️  Cross-folder edit detected: $file"
              echo "   You (@${ACTOR}) are editing @${FOLDER_USER}'s folder"
              echo "   This requires @${FOLDER_USER}'s approval"
              SELF_OWNED=false
            else
              echo "Valid: $file"
            fi

          done < changed.txt

          if [ "$ERRORS" -gt 0 ]; then
            echo ""
            echo "────────────────────────────────────────────"
            echo "❌ ${ERRORS} invalid path(s). Fix and re-push."
            echo "   Posts must go in: src/content/posts/{your-github-username}/{post}.md"
            echo "────────────────────────────────────────────"
            exit 1
          fi

          echo "self_owned=$SELF_OWNED" >> $GITHUB_OUTPUT
          echo "has_post_files=$HAS_POST_FILES" >> $GITHUB_OUTPUT
          echo " Path validation passed"

  # ─────────────────────────────────────────
  # JOB 2: Build (validates frontmatter via Zod)
  # ─────────────────────────────────────────
  build:
    name: Build Site
    runs-on: ubuntu-latest
    needs: validate-and-handle

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx astro build
        # Astro validates ALL frontmatter via Zod schema in config.ts
        # Missing required field → build fails → PR blocked
        # Error message shows exactly which file + which field

  # ─────────────────────────────────────────
  # JOB 3: Auto-merge if self-owned content
  # ─────────────────────────────────────────
  auto-merge:
    name: Auto Merge (own content)
    runs-on: ubuntu-latest
    needs: [validate-and-handle, build]
    # Only auto-merge if:
    # - all checks passed
    # - user is uploading to their own folder
    if: needs.validate-and-handle.outputs.self_owned == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Auto approve and merge
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"

          # Approve the PR as the Actions bot
          gh pr review $PR_NUMBER --approve --body "✅ Auto-approved: own content, all checks passed."

          # Merge it
          gh pr merge $PR_NUMBER --squash --auto --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
